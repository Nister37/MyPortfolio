[build]
builder = "nixpacks"
buildCommand = "npm run build"

[deploy]
startCommand = "npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
# Strapi v5 exposes /_health by default. Railway will wait for it before
# routing traffic, preventing visible downtime during redeploys.
healthcheckPath = "/_health"
healthcheckTimeout = 30


